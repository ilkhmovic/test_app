{% extends "base.html" %}
{% block title %} Savol Qo'shish - {{ test.title }} {% endblock title %}
{% block content %}
<div class="container py-4">
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden mb-5 bg-card">
        <!-- Header with Gradient -->
        <div class="p-4 p-md-5 text-white" style="background: var(--primary-gradient) !important;">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" style="width: 50px; height: 50px; font-size: 20px;">
                        <i class="fas fa-plus-circle"></i>
                    </div>
                    <div>
                        <h2 class="fw-bold mb-0 text-white">Yangi Savol Qo'shish</h2>
                        <p class="mb-0 opacity-75">{{ test.title }}</p>
                    </div>
                </div>
                <div class="text-end d-none d-md-block">
                    <span class="badge bg-white text-primary rounded-pill px-3 py-2 fw-bold shadow-sm">
                        <i class="fas fa-list-ul me-1"></i> {{ test.question_set.count }} ta mavjud savol
                    </span>
                </div>
            </div>
        </div>

        <div class="card-body p-4 p-md-5">
            <form method="post" id="questionForm">
                {% csrf_token %}
                
                <!-- Savol matni -->
                <div class="mb-5">
                    <label class="form-label fw-bold text-muted small text-uppercase mb-3" style="letter-spacing: 1px;">Savol Matni</label>
                    <textarea name="question" class="form-control form-control-lg" rows="4" 
                              placeholder="Savol matnini bu yerga kiriting..." required
                              style="border-radius: 16px; font-size: 1.1rem; padding: 20px;" id="questionInput"></textarea>
                </div>
                
                <!-- Variantlar -->
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light text-primary fw-bold" style="border-radius: 12px 0 0 12px; width: 50px; justify-content: center; border: 1px solid var(--border);">A</span>
                            <input type="text" name="a" class="form-control" placeholder="A variant matni" style="border-radius: 0 12px 12px 0;" required id="aInput">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light text-primary fw-bold" style="border-radius: 12px 0 0 12px; width: 50px; justify-content: center; border: 1px solid var(--border);">B</span>
                            <input type="text" name="b" class="form-control" placeholder="B variant matni" style="border-radius: 0 12px 12px 0;" required id="bInput">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light text-primary fw-bold" style="border-radius: 12px 0 0 12px; width: 50px; justify-content: center; border: 1px solid var(--border);">C</span>
                            <input type="text" name="c" class="form-control" placeholder="C variant matni" style="border-radius: 0 12px 12px 0;" required id="cInput">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light text-primary fw-bold" style="border-radius: 12px 0 0 12px; width: 50px; justify-content: center; border: 1px solid var(--border);">D</span>
                            <input type="text" name="d" class="form-control" placeholder="D variant matni" style="border-radius: 0 12px 12px 0;" required id="dInput">
                        </div>
                    </div>
                </div>
                
                <!-- To'g'ri javob -->
                <div class="row mt-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small text-uppercase mb-2" style="letter-spacing: 1px;">To'g'ri Javobni Tanlang</label>
                        <select name="true_answer" class="form-select form-select-lg" style="border-radius: 12px;" required id="trueAnswerSelect">
                            <option value="">Tanlang...</option>
                            <option value="a">A Varianti</option>
                            <option value="b">B Varianti</option>
                            <option value="c">C Varianti</option>
                            <option value="d">D Varianti</option>
                        </select>
                    </div>
                </div>
                
                <!-- Tugmalar -->
                <div class="mt-5 pt-4 border-top d-flex flex-wrap gap-3" style="border-color: var(--border) !important;">
                    <button type="submit" class="btn btn-success btn-lg px-4 fw-bold" style="border-radius: 12px;" id="saveBtn">
                        <i class="fas fa-save me-2"></i> Saqlash
                    </button>
                    <button type="button" class="btn btn-outline-primary btn-lg px-4 fw-bold" style="border-radius: 12px;" id="saveAndNewBtn">
                        <i class="fas fa-plus me-2"></i> Saqlab va Yangi Qo'shish
                    </button>
                    <a href="{% url 'mass_create_questions' test.id %}" class="btn btn-outline-secondary btn-lg px-4 fw-bold ms-md-auto" style="border-radius: 12px;">
                        <i class="fas fa-arrow-left me-2"></i> Orqaga
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('questionForm');
    const saveBtn = document.getElementById('saveBtn');
    const saveAndNewBtn = document.getElementById('saveAndNewBtn');
    const questionInput = document.getElementById('questionInput');
    const aInput = document.getElementById('aInput');
    const bInput = document.getElementById('bInput');
    const cInput = document.getElementById('cInput');
    const dInput = document.getElementById('dInput');
    const trueAnswerSelect = document.getElementById('trueAnswerSelect');
    
    let saveAndNew = false;
    
    saveAndNewBtn.addEventListener('click', function() {
        if (validateForm()) {
            saveAndNew = true;
            setLoadingState(true);
            const formData = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(response => {
                if (response.ok) {
                    clearForm();
                    setLoadingState(false);
                    saveAndNew = false;
                    showMessage('Savol muvaffaqiyatli saqlandi! Yangi savol qo\'shishingiz mumkin.', 'success');
                } else throw new Error('Server xatosi');
            })
            .catch(error => {
                setLoadingState(false);
                saveAndNew = false;
                showMessage('Xatolik yuz berdi: ' + error.message, 'error');
            });
        }
    });
    
    form.addEventListener('submit', function(e) {
        if (!saveAndNew) setLoadingState(true);
        else e.preventDefault();
    });
    
    function validateForm() {
        const inputs = [questionInput, aInput, bInput, cInput, dInput, trueAnswerSelect];
        let isValid = true;
        inputs.forEach(input => {
            if (!input.value.trim()) {
                input.classList.add('is-invalid');
                isValid = false;
            } else input.classList.remove('is-invalid');
        });
        if (!isValid) showMessage('Iltimos, barcha maydonlarni to\'ldiring!', 'error');
        return isValid;
    }
    
    function clearForm() {
        [questionInput, aInput, bInput, cInput, dInput, trueAnswerSelect].forEach(i => i.value = '');
        questionInput.focus();
    }
    
    function setLoadingState(loading) {
        if (loading) {
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            saveAndNewBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            [saveBtn, saveAndNewBtn].forEach(b => b.disabled = true);
        } else {
            saveBtn.innerHTML = '<i class="fas fa-save me-2"></i> Saqlash';
            saveAndNewBtn.innerHTML = '<i class="fas fa-plus me-2"></i> Saqlab va Yangi Qo\'shish';
            [saveBtn, saveAndNewBtn].forEach(b => b.disabled = false);
        }
    }
    
    function showMessage(message, type) {
        const existingAlerts = document.querySelectorAll('.custom-alert');
        existingAlerts.forEach(a => a.remove());
        const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
        const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle';
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert ${alertClass} alert-dismissible fade show custom-alert shadow-sm border-0 position-fixed top-0 start-50 translate-middle-x mt-4`;
        alertDiv.style.zIndex = '9999';
        alertDiv.style.borderRadius = '12px';
        alertDiv.innerHTML = `<i class="fas ${icon} me-2"></i> ${message} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
        document.body.appendChild(alertDiv);
        setTimeout(() => alertDiv.remove(), 4000);
    }
});
</script>

<style>
    .bg-card { background-color: var(--bg-card); }
    .is-invalid { border-color: var(--danger) !important; }
</style>
{% endblock %}
